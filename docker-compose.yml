services:
    parakeet:
        build:
            context: .
            dockerfile: Dockerfile
        image: parakeet-api:latest
        ports:
            - "8000:8000"
        environment:
            - HUGGINGFACE_ACCESS_TOKEN=${HUGGINGFACE_ACCESS_TOKEN:-}
            - HOST=0.0.0.0
            - PORT=8000
            - DEBUG=0
        volumes:
            - hf-cache:/app/.cache/huggingface
        # If you intend to use GPU, either use the GPU Dockerfile or run with --gpus all
        # deploy:
        #   resources:
        #     reservations:
        #       devices:
        #         - capabilities: [gpu]

volumes:
    hf-cache:
